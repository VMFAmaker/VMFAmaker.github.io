<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document Viewer | Virgilio MF Almeida</title>
    <style>
      :root {
        --bg: #0b0f14;
        --bg-2: #101720;
        --text: #e6e6e6;
        --muted: #aab4bf;
        --faint: #77828f;
        --border: rgba(255, 255, 255, 0.1);
        --teal: #58b6ad;
      }
      * { box-sizing: border-box; margin: 0; }
      html, body { height: 100%; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; }
      body { display: flex; flex-direction: column; }
      .viewer-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        height: 52px;
        padding: 0 24px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-2);
        flex-shrink: 0;
      }
      .viewer-bar a {
        color: var(--teal);
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.06em;
      }
      .viewer-bar a:hover { text-decoration: underline; }
      .viewer-title {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .viewer-notice {
        color: var(--faint);
        font-size: 0.68rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        flex-shrink: 0;
      }
      .viewer-frame {
        flex: 1;
        width: 100%;
        border: none;
        background: var(--bg);
      }
      .viewer-error {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: var(--faint);
        font-size: 0.9rem;
      }
      .pdf-scroll-container {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 16px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .pdf-scroll-container canvas {
        display: block;
        max-width: 100%;
        height: auto !important;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      }
      .pdf-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: var(--faint);
        font-size: 0.85rem;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
  </head>
  <body oncontextmenu="return false">
    <div class="viewer-bar">
      <a id="back-link" href="/work/">Back to project</a>
      <span class="viewer-title" id="doc-title"></span>
      <span class="viewer-notice">View only</span>
    </div>
    <div id="viewer-root" style="flex:1;display:flex"></div>
    <script type="module">
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      const title = params.get("title") || "Document";
      const back = params.get("back") || "/work/";
      const root = document.getElementById("viewer-root");
      const titleEl = document.getElementById("doc-title");
      const backLink = document.getElementById("back-link");

      titleEl.textContent = title;
      backLink.href = back;

      if (!file) {
        root.innerHTML = '<div class="viewer-error">No document specified.</div>';
      } else {
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;

        if (isMobile) {
          root.innerHTML = '<div class="pdf-loading">Loading document…</div>';

          const pdfjsLib = await import("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs");
          pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

          try {
            const pdf = await pdfjsLib.getDocument(file).promise;
            root.innerHTML = "";
            const container = document.createElement("div");
            container.className = "pdf-scroll-container";
            root.appendChild(container);

            const containerWidth = container.clientWidth - 32;

            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const unscaledViewport = page.getViewport({ scale: 1 });
              const scale = Math.min(2, containerWidth / unscaledViewport.width);
              const viewport = page.getViewport({ scale });

              const canvas = document.createElement("canvas");
              canvas.width = viewport.width;
              canvas.height = viewport.height;
              canvas.style.width = Math.min(containerWidth, viewport.width) + "px";
              container.appendChild(canvas);

              await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
            }
          } catch (err) {
            root.innerHTML = '<div class="viewer-error">Could not load document.</div>';
          }
        } else {
          const embed = document.createElement("embed");
          embed.src = file + "#toolbar=0&navpanes=0&scrollbar=1";
          embed.type = "application/pdf";
          embed.className = "viewer-frame";
          root.appendChild(embed);
        }
      }
    </script>
  </body>
</html>
